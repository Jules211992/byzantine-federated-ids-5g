test:
  name: governance-submitalert-2peers-any
  description: 10 workers, load-balanced org1/org2, SubmitAlert
  workers:
    type: local
    number: 5

  rounds:
    - label: submit-alert-tps500
      txNumber: 50000
      rateControl:
        type: fixed-rate
        opts:
          tps: 500
      workload:
        module: benchmarks/workload/submit-alert.js
        arguments:
          contractId: governance

    - label: submit-alert-tps1000
      txNumber: 50000
